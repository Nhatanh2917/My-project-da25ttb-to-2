<!DOCYPE html>
<html lang ="vi">
    <head>
        <title> Nhập dữ liệu hiện thị với prompt và alert </title>
        <meta chraset = "utf-8">
		<link rel="stylesheet" href="../css/style03.css">
    </head>
    <body>
		<script>
			let name = prompt("Nhập vào tên của bạn:");
			let yob = prompt("Nhập vào năm sinh của bạn:");
			alert(`xin chào $ {name}, năm 2026 bạn đã" ${2026 - yob} rồi đó.`);
		</script>
    </body>
</html>
